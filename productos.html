<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Productos SaludNova</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#eef5fa;
}

.marquesina{
    width:100%;
    background:#006fa3;
    color:white;
    padding:12px;
}

.header{
    background:linear-gradient(135deg,#0096d6,#00bfff);
    color:white;
    text-align:center;
    padding:50px 20px;
}

.menu{
    width:95%;
    margin:auto;
    margin-top:-25px;
    background:white;
    border-radius:25px;
    padding:20px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.boton{
    border:none;
    background:linear-gradient(135deg,#0096d6,#00b7ff);
    color:white;
    width:180px;
    height:55px;
    border-radius:15px;
    cursor:pointer;
}

.productos{
    width:92%;
    margin:60px auto;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    text-align:center;
    padding-bottom:20px;
}

.card img{
    width:85%;
    height:260px;
    object-fit:cover;
    margin-top:20px;
}

.card h3{
    margin-top:15px;
    color:#0096d6;
}

.precio{
    color:#00a651;
    font-size:22px;
    font-weight:bold;
    margin:15px;
}

.footer{
    background:#0096d6;
    color:white;
    text-align:center;
    padding:40px;
    margin-top:50px;
}

.umg{
    width:220px;
    height:auto;
    border-radius:20px;
    background:white;
    padding:10px;
    margin-top:30px;
}

</style>

</head>

<body>

<audio autoplay loop controls style="width:100%;">
<source src="musica.mp3" type="audio/mp3">
</audio>

<div class="marquesina">
Carnet: 0900-25-12345 | Nombre: Celso Brooks
</div>

<div class="header">

<h1>Productos SaludNova</h1>

<p>
Calidad y bienestar para toda tu familia
</p>

</div>

<div class="menu">

<button class="boton"
onclick="window.location.href='index.html'">
Inicio
</button>

<button class="boton"
onclick="window.location.href='Paginau.html'">
Contacto
</button>

</div>

<div class="productos">

<div class="grid">

<div class="card">

<img src="vitaminas.jpg">

<h3>Vitaminas Premium</h3>

<div class="precio">
Q175
</div>

</div>

<div class="card">

<img src="jarabe.jpg">

<h3>Jarabe Infantil</h3>

<div class="precio">
Q95
</div>

</div>

<div class="card">

<img src="paracetamol.jpg">

<h3>Paracetamol</h3>

<div class="precio">
Q40
</div>

</div>

</div>

</div>

<div class="footer">

<h2>SaludNova</h2>

<p>
Tu salud, nuestra prioridad
</p>

<img src="umg.jpg" class="umg">

</div>

</body>
</html>
